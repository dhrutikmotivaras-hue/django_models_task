<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Course Details</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <!-- Display course name using Django template tags -->
        <h1 class="mb-4 text-primary">{{ course.name }}</h1>
        <hr>

        <h3 class="mt-4 mb-3">Lessons</h3>
        <div class="list-group">
            <!-- Loop through related lessons -->
            {% for lesson in course.lesson_set.all %}
            <div class="list-group-item list-group-item-action mb-2 border rounded shadow-sm">
                <h5 class="mb-1">{{ lesson.title }}</h5>
                <p class="mb-1 text-muted">{{ lesson.content }}</p>
            </div>
            {% empty %}
            <div class="alert alert-info" role="alert">
                No lessons available for this course yet!
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
